metadata:
  id: debug-async-001
  title: 'Promise 체이닝 버그 수정'
  category: debug
  difficulty: easy
  estimated_minutes: 6
  version: 1
  author: '운영자'
  created_at: '2026-04-25'

context:
  background: |
    체크아웃 요약을 만드는 함수가 간헐적으로 couponCode를 비워서 반환하고,
    주문이 없는 사용자는 런타임 에러를 냅니다.
  scenario: |
    비동기 흐름을 안정적으로 바로잡아야 합니다.
    사용자 없음, 주문 없음, 쿠폰 실패를 각각 구분 처리해야 합니다.

requirements:
  - id: req-1
    description: '비동기 흐름이 안정적으로 종료되어야 함'
    weight: 0.35
  - id: req-2
    description: '사용자 없음, 주문 없음, 쿠폰 실패를 구분 처리'
    weight: 0.4
  - id: req-3
    description: '제출물이 타입 시그니처를 지켜야 함'
    weight: 0.25

artifact_format:
  type: code
  language: typescript
  stub: |
    export async function buildCheckoutSummary(userId: string) {
      // TODO
    }

test_cases:
  - id: tc-positive-1
    input: 'userId = "u-100"'
    expected_output: 'couponCode: "SPRING10", latestOrderTotal: 42000'
    type: positive
  - id: tc-edge-1
    input: 'userId = "u-empty"'
    expected_output: 'orderCount: 0, latestOrderTotal: 0, couponCode: null'
    type: edge_case
  - id: tc-negative-1
    input: 'userId = "missing"'
    expected_output: 'throw new Error("USER_NOT_FOUND")'
    type: negative
  - id: tc-error-1
    input: 'coupon 조회 실패'
    expected_output: '주문 정보는 유지, couponCode만 null 처리'
    type: error_handling

constraints:
  max_attempts: 5
  time_limit_seconds: 600

baseline:
  median_total_tokens: 900
  median_attempts: 2
  median_time_seconds: 300
  computed_from_sessions: 0
